name: Catalog Release

on:
  push:
    branches: [master]
    paths:
      - dockertest-catalog/**
      - .github/workflows/docker-catalog-release.yml

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: v
        run: echo "n=$(($(git tag -l 'catalog-v*' | wc -l) + 1))" >> $GITHUB_OUTPUT

      - id: image
        run: echo "name=$(echo ghcr.io/${{ github.repository_owner }}/dockertest-catalog | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: dockertest-catalog
          push: true
          build-args: APP_VERSION=${{ steps.v.outputs.n }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.v.outputs.n }}
            ${{ steps.image.outputs.name }}:latest

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: catalog-v${{ steps.v.outputs.n }}
          name: Catalog v${{ steps.v.outputs.n }}
          body: |
            ## Docker

            ```bash
            docker pull ${{ steps.image.outputs.name }}:${{ steps.v.outputs.n }}
            docker run -d -p 8090:8090 \
              -v catalog-releases:/app/wwwroot/releases \
              ${{ steps.image.outputs.name }}:${{ steps.v.outputs.n }}
            ```

            Agent ayarı:
            `Agent__CatalogUrl=http://catalog:8090` (aynı docker network)
