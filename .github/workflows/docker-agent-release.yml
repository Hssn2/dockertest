name: Agent Release

on:
  push:
    branches: [master]
    paths:
      - dockertest-agent/**
      - .github/workflows/docker-agent-release.yml

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.n }}
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: v
        run: echo "n=$(($(git tag -l 'agent-v*' | wc -l) + 1))" >> $GITHUB_OUTPUT

      - id: image
        run: echo "name=$(echo ghcr.io/${{ github.repository_owner }}/dockertest-agent | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: dockertest-agent
          file: dockertest-agent/Dockerfile
          push: true
          build-args: APP_VERSION=${{ needs.prepare.outputs.version }}
          tags: |
            ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux
            ${{ needs.prepare.outputs.image }}:latest-linux

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Switch to Windows containers
        shell: powershell
        run: |
          & $Env:ProgramFiles\Docker\Docker\DockerCli.exe -SwitchDaemon

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Windows image
        shell: powershell
        run: |
          $image = "${{ needs.prepare.outputs.image }}"
          $version = "${{ needs.prepare.outputs.version }}"
          docker build -f dockertest-agent/Dockerfile.windows --build-arg APP_VERSION=$version `
            -t "${image}:${version}-windows" `
            -t "${image}:latest-windows" dockertest-agent
          docker push "${image}:${version}-windows"
          docker push "${image}:latest-windows"

  release:
    needs: [prepare, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-v${{ needs.prepare.outputs.version }}
          name: Agent v${{ needs.prepare.outputs.version }}
          body: |
            ## Docker

            - Linux: `${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux`
            - Windows (Server 2019): `${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-windows`
