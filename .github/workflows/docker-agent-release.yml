name: Agent Release

on:
  push:
    branches: [master]
    paths:
      - dockertest-agent/**
      - .github/workflows/docker-agent-release.yml

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: v
        run: echo "n=$(($(git tag -l 'agent-v*' | wc -l) + 1))" >> $GITHUB_OUTPUT

      - id: image
        run: echo "name=$(echo ghcr.io/${{ github.repository_owner }}/dockertest-agent | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: dockertest-agent
          push: true
          build-args: APP_VERSION=${{ steps.v.outputs.n }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.v.outputs.n }}
            ${{ steps.image.outputs.name }}:latest

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-v${{ steps.v.outputs.n }}
          name: Agent v${{ steps.v.outputs.n }}
