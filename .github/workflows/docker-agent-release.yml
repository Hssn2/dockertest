name: Agent Release

on:
  push:
    branches: [master]
    paths:
      - dockertest-agent/**
      - installer/**
      - .github/workflows/docker-agent-release.yml

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.n }}
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: v
        run: echo "n=$(($(git tag -l 'agent-v*' | wc -l) + 1))" >> $GITHUB_OUTPUT

      - id: image
        run: echo "name=$(echo ghcr.io/${{ github.repository_owner }}/dockertest-agent | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: dockertest-agent
          push: true
          build-args: APP_VERSION=${{ steps.v.outputs.n }}
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.v.outputs.n }}
            ${{ steps.image.outputs.name }}:latest

      - name: Windows installer paketi hazirla
        run: |
          VERSION=${{ steps.v.outputs.n }}
          IMAGE=${{ steps.image.outputs.name }}
          OUT=dist/dockertest-agent-installer-windows
          mkdir -p "$OUT"
          cp installer/windows/Kur.bat installer/windows/install.ps1 installer/windows/config.json installer/windows/OKU.txt installer/windows/Kaldir.bat "$OUT/"
          sed -i "s|dockertest-agent:latest|dockertest-agent:${VERSION}|g" "$OUT/config.json"
          sed -i "s|ghcr.io/hssn2/dockertest-agent:latest|${IMAGE}:${VERSION}|g" "$OUT/config.json"
          (cd dist && zip -r dockertest-agent-installer-windows-v${VERSION}.zip dockertest-agent-installer-windows)

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-v${{ steps.v.outputs.n }}
          name: Agent v${{ steps.v.outputs.n }}
          files: dist/dockertest-agent-installer-windows-v${{ steps.v.outputs.n }}.zip
          body: |
            ## Windows sunucu kurulumu (repo gerekmez)

            1. `dockertest-agent-installer-windows-v${{ steps.v.outputs.n }}.zip` indir
            2. Klasore cikar
            3. `Kur.bat` -> Yonetici olarak calistir
            4. Tarayici: `http://SUNUCU-IP:8080`

            Kurulum: Docker + PostgreSQL + Agent (port 8080). Ana uygulama agent uzerinden deploy edilir.

            ## Docker (manuel)

            ```bash
            docker pull ${{ steps.image.outputs.name }}:${{ steps.v.outputs.n }}
            docker run -d -p 8080:8080 \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -e Agent__AppDatabaseConnectionString="Host=host.docker.internal;Port=5432;Database=dockertest;Username=sa;Password=sa123" \
              -e Agent__AppDatabaseAutoMigrate=true \
              ${{ steps.image.outputs.name }}:${{ steps.v.outputs.n }}
            ```

  windows-exe-installer:
    runs-on: windows-latest
    needs: release
    steps:
      - uses: actions/checkout@v4

      - name: EXE paketi hazirla
        shell: pwsh
        run: |
          $version = "${{ needs.release.outputs.version }}"
          $image = "${{ needs.release.outputs.image }}"
          $outDir = "dist/dockertest-agent-installer-windows-exe"
          $launcherDir = "dist/launcher-src"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          New-Item -ItemType Directory -Path $launcherDir -Force | Out-Null

          Copy-Item installer/windows/config.json "$outDir/config.json"
          Copy-Item installer/windows/install.ps1 "$outDir/install.ps1"
          Copy-Item installer/windows/Kur.bat "$outDir/Kur.bat"
          Copy-Item installer/windows/OKU.txt "$outDir/OKU.txt"
          Copy-Item installer/windows/Kaldir.bat "$outDir/Kaldir.bat"

          $cfgPath = "$outDir/config.json"
          $cfgText = Get-Content $cfgPath -Raw
          $cfgText = $cfgText.Replace("dockertest-agent:latest", "dockertest-agent:$version")
          $cfgText = $cfgText.Replace("ghcr.io/hssn2/dockertest-agent:latest", "$image:$version")
          Set-Content -Path $cfgPath -Value $cfgText -Encoding UTF8

          $csprojText = @(
            '<Project Sdk="Microsoft.NET.Sdk">',
            '  <PropertyGroup>',
            '    <OutputType>Exe</OutputType>',
            '    <TargetFramework>net8.0</TargetFramework>',
            '    <AssemblyName>Kurulum</AssemblyName>',
            '    <Nullable>enable</Nullable>',
            '  </PropertyGroup>',
            '</Project>'
          ) -join "`n"
          Set-Content -Path "$launcherDir/Kurulum.csproj" -Value $csprojText -Encoding UTF8

          $programText = @(
            'using System.Diagnostics;',
            'using System.IO;',
            '',
            'var baseDir = AppContext.BaseDirectory;',
            'var batPath = Path.Combine(baseDir, "Kur.bat");',
            'if (!File.Exists(batPath))',
            '{',
            '    Console.Error.WriteLine($"Kur.bat bulunamadi: {batPath}");',
            '    return 1;',
            '}',
            '',
            'var process = Process.Start(new ProcessStartInfo',
            '{',
            '    FileName = batPath,',
            '    WorkingDirectory = baseDir,',
            '    UseShellExecute = true',
            '});',
            '',
            'if (process is null)',
            '{',
            '    Console.Error.WriteLine("Kurulum baslatilamadi.");',
            '    return 1;',
            '}',
            '',
            'return 0;'
          ) -join "`n"
          Set-Content -Path "$launcherDir/Program.cs" -Value $programText -Encoding UTF8

          dotnet publish "$launcherDir/Kurulum.csproj" -c Release -r win-x64 --self-contained false /p:PublishSingleFile=true -o "$launcherDir/publish"
          Copy-Item "$launcherDir/publish/Kurulum.exe" "$outDir/Kurulum.exe" -Force

          Compress-Archive `
            -Path "$outDir/*" `
            -DestinationPath "dist/dockertest-agent-installer-windows-exe-v$version.zip" `
            -Force

      - name: EXE paketini release'e ekle
        uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-v${{ needs.release.outputs.version }}
          files: dist/dockertest-agent-installer-windows-exe-v${{ needs.release.outputs.version }}.zip
          overwrite_files: true
