name: Agent Release

on:
  push:
    branches: [master]
    paths:
      - dockertest-agent/**
      - installer/**
      - .github/workflows/docker-agent-release.yml

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.v.outputs.n }}
      image: ${{ steps.image.outputs.name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: v
        run: echo "n=$(($(git tag -l 'agent-v*' | wc -l) + 1))" >> $GITHUB_OUTPUT

      - id: image
        run: echo "name=$(echo ghcr.io/${{ github.repository_owner }}/dockertest-agent | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: dockertest-agent
          file: dockertest-agent/Dockerfile
          push: true
          build-args: APP_VERSION=${{ needs.prepare.outputs.version }}
          tags: |
            ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux
            ${{ needs.prepare.outputs.image }}:latest-linux

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Switch to Windows containers
        shell: powershell
        run: |
          & $Env:ProgramFiles\Docker\Docker\DockerCli.exe -SwitchDaemon

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Windows image
        shell: powershell
        run: |
          $image = "${{ needs.prepare.outputs.image }}"
          $version = "${{ needs.prepare.outputs.version }}"
          docker build -f dockertest-agent/Dockerfile.windows --build-arg APP_VERSION=$version `
            -t "${image}:${version}-windows" `
            -t "${image}:latest-windows" dockertest-agent
          docker push "${image}:${version}-windows"
          docker push "${image}:latest-windows"

  package-installer:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Windows installer paketi hazirla
        run: |
          VERSION=${{ needs.prepare.outputs.version }}
          IMAGE=${{ needs.prepare.outputs.image }}
          OUT=dist/dockertest-agent-installer-windows
          mkdir -p "$OUT"
          cp installer/windows/Kur.bat installer/windows/install.ps1 installer/windows/config.json installer/windows/OKU.txt installer/windows/Kaldir.bat "$OUT/"
          sed -i "s|dockertest-agent:latest|dockertest-agent:${VERSION}-windows|g" "$OUT/config.json"
          sed -i "s|ghcr.io/hssn2/dockertest-agent:latest|${IMAGE}:${VERSION}-windows|g" "$OUT/config.json"
          (cd dist && zip -r dockertest-agent-installer-windows-v${VERSION}.zip dockertest-agent-installer-windows)

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/dockertest-agent-installer-windows-v${{ needs.prepare.outputs.version }}.zip

  release:
    needs: [prepare, build-linux, build-windows, package-installer]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: agent-v${{ needs.prepare.outputs.version }}
          name: Agent v${{ needs.prepare.outputs.version }}
          files: dist/dockertest-agent-installer-windows-v${{ needs.prepare.outputs.version }}.zip
          body: |
            ## Windows sunucu kurulumu (repo gerekmez)

            1. `dockertest-agent-installer-windows-v${{ needs.prepare.outputs.version }}.zip` indir
            2. Klasore cikar
            3. `Kur.bat` -> Yonetici olarak calistir
            4. Tarayici: `http://SUNUCU-IP:8080`

            Kurulum: Docker + PostgreSQL + Agent (port 8080). Ana uygulama agent uzerinden deploy edilir.

            ## Docker (manuel)

            Linux:
            ```bash
            docker pull ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux
            docker run -d -p 8080:8080 \
              -v /var/run/docker.sock:/var/run/docker.sock \
              -e Agent__AppDatabaseConnectionString="Host=host.docker.internal;Port=5432;Database=dockertest;Username=sa;Password=sa123" \
              -e Agent__AppDatabaseAutoMigrate=true \
              ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux
            ```

            Windows (Server 2019):
            ```powershell
            docker pull ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-windows
            docker run -d -p 8080:8080 `
              -e Agent__AppDatabaseConnectionString="Host=host.docker.internal;Port=5432;Database=dockertest;Username=sa;Password=sa123" `
              -e Agent__AppDatabaseAutoMigrate=true `
              ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-windows
            ```
