name: Auto Release

on:
  push:
    branches:
      - release
    paths:
      - 'Controllers/**'
      - 'Views/**'
      - 'wwwroot/**'
      - 'Models/**'
      - 'Properties/**'
      - 'Program.cs'
      - 'dockertest.csproj'
      - 'Dockerfile'
      - 'Dockerfile.windows'
      - '.dockerignore'
      - 'appsettings.json'
      - 'appsettings.*.json'
      - '.github/workflows/docker-release.yml'

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      image: ${{ steps.image.outputs.name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get last app tag
        id: lasttag
        run: |
          git fetch --tags
          LAST=$(git tag -l 'v*' --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LAST" ]; then
            LAST="v0.0.0"
          fi
          echo "last=$LAST" >> "$GITHUB_OUTPUT"

      - name: Determine bump type
        id: bump
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if echo "$MSG" | grep -qi "major"; then
            echo "type=major" >> "$GITHUB_OUTPUT"
          elif echo "$MSG" | grep -qi "minor"; then
            echo "type=minor" >> "$GITHUB_OUTPUT"
          else
            echo "type=patch" >> "$GITHUB_OUTPUT"
          fi

      - name: Calculate new version
        id: version
        run: |
          LAST="${{ steps.lasttag.outputs.last }}"
          LAST="${LAST#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LAST"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          if [ "${{ steps.bump.outputs.type }}" = "major" ]; then
            MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0
          elif [ "${{ steps.bump.outputs.type }}" = "minor" ]; then
            MINOR=$((MINOR + 1)); PATCH=0
          else
            PATCH=$((PATCH + 1))
          fi

          echo "version=${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"
          echo "tag=v${MAJOR}.${MINOR}.${PATCH}" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        run: |
          IMAGE=$(echo "ghcr.io/${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "name=$IMAGE" >> "$GITHUB_OUTPUT"

  build-linux:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: APP_VERSION=${{ needs.prepare.outputs.version }}
          tags: |
            ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux
            ${{ needs.prepare.outputs.image }}:latest-linux

  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Switch to Windows containers
        shell: powershell
        run: |
          & $Env:ProgramFiles\Docker\Docker\DockerCli.exe -SwitchDaemon

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Windows image
        shell: powershell
        run: |
          $image = "${{ needs.prepare.outputs.image }}"
          $version = "${{ needs.prepare.outputs.version }}"
          docker build -f Dockerfile.windows --build-arg APP_VERSION=$version `
            -t "${image}:${version}-windows" `
            -t "${image}:latest-windows" .
          docker push "${image}:${version}-windows"
          docker push "${image}:latest-windows"

  release:
    needs: [prepare, build-linux, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Release ${{ needs.prepare.outputs.tag }}
          generate_release_notes: true
          body: |
            ## Docker

            GitHub release sürümü: **${{ needs.prepare.outputs.version }}**  
            Image tag'leri platforma göre `-linux` / `-windows` soneki alır.

            ### Linux
            ```bash
            docker pull ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux
            docker run -d -p 80:8080 \
              -e Database__ConnectionString="Host=host.docker.internal;Port=5432;Database=dockertest;Username=sa;Password=sa123" \
              -e Database__AutoMigrate=true \
              ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-linux
            ```

            ### Windows (Server 2019 / LTSC 2019)
            ```powershell
            docker pull ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-windows
            docker run -d -p 80:8080 `
              -e Database__ConnectionString="Host=host.docker.internal;Port=5432;Database=dockertest;Username=sa;Password=sa123" `
              -e Database__AutoMigrate=true `
              ${{ needs.prepare.outputs.image }}:${{ needs.prepare.outputs.version }}-windows
            ```

            | Bump | Commit mesajında |
            |------|----------------|
            | major | `major` geçmeli |
            | minor | `minor` geçmeli |
            | patch | varsayılan |
