services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-dockertest}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-dockertest}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: ghcr.io/hssn2/dockertest:${APP_VERSION:-latest}
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-80}:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      Database__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-dockertest};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Database__AutoMigrate: "true"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
