services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5148:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: "http://+:8080"
      Database__ConnectionString: "Host=postgres;Port=5432;Database=${POSTGRES_DB:-dockertest};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}"
      Database__AutoMigrate: "true"
