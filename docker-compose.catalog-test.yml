services:
  catalog:
    image: ghcr.io/hssn2/dockertest-catalog:latest
    build:
      context: ./dockertest-catalog
    ports:
      - "8090:8090"
    environment:
      Catalog__PublicBaseUrl: "http://localhost:8090"
    volumes:
      - catalog-releases:/app/wwwroot/releases

  agent:
    build:
      context: ./dockertest-agent
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      Agent__CatalogUrl: "http://catalog:8090"
      Agent__AppHostPort: "80"
      Agent__AppDatabaseEnabled: "true"
      Agent__AppDatabaseHost: "host.docker.internal"
      Agent__AppDatabasePort: "5432"
      Agent__AppDatabaseName: "dockertest"
      Agent__AppDatabaseUsername: "sa"
      Agent__AppDatabasePassword: "sa123"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - catalog

volumes:
  catalog-releases:
